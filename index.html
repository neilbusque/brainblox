<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#5fc6f0" />
    <title>BrainBlox - Jump and Learn!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%234cc9f0'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle'%3E%F0%9F%A7%A9%3C/text%3E%3C/svg%3E" />
    <script type="module" crossorigin src="/brainblox/assets/index-BUcnl3xz.js"></script>
    <link rel="stylesheet" crossorigin href="/brainblox/assets/index-DKK48ECN.css">
  </head>
  <body>
    <!-- 3D canvas lives here (added by Three.js) -->
    <div id="game-root"></div>

    <!-- free CSS vignette for depth -->
    <div class="vignette"></div>

    <!-- ============ LOBBY / START SCREEN ============ -->
    <div id="lobby" class="screen">
      <div class="lobby-card">
        <h1 class="logo">BrainBlox</h1>
        <p class="tagline">Jump, play, and learn with friends!</p>

        <label class="field-label" for="name-input">Your name</label>
        <input id="name-input" class="text-input" type="text" maxlength="12" placeholder="Type your name" autocomplete="off" />

        <div class="lobby-buttons">
          <button id="btn-solo" class="btn btn-big">Play Alone</button>
          <button id="btn-create" class="btn btn-big btn-accent">Create a Room</button>
        </div>

        <div class="join-row">
          <input id="code-input" class="text-input code" type="text" maxlength="7" placeholder="ROOM CODE" autocomplete="off" />
          <button id="btn-join" class="btn">Join</button>
        </div>

        <p id="lobby-msg" class="lobby-msg"></p>
      </div>
    </div>

    <!-- ============ IN-GAME HUD ============ -->
    <div id="hud" class="hidden">
      <!-- top bar -->
      <div class="hud-top">
        <div class="hud-stars">⭐ <span id="star-count">0</span></div>
        <div id="room-badge" class="room-badge hidden">
          Room <span id="room-code-label"></span>
          <button id="btn-copy" class="mini-btn" title="Copy invite link">Copy link</button>
        </div>
        <div class="hud-top-right">
          <button id="btn-mute" class="icon-btn hidden" title="Mic">🎤</button>
          <button id="btn-fs" class="icon-btn" title="Fullscreen">⛶</button>
        </div>
      </div>

      <!-- players in room -->
      <div id="player-list" class="player-list"></div>

      <!-- touch controls (shown only on touch devices) -->
      <div id="touch-controls" class="hidden">
        <div id="joystick" class="joystick">
          <div id="joystick-knob" class="joystick-knob"></div>
        </div>
        <button id="jump-btn" class="jump-btn">JUMP</button>
      </div>

      <!-- transient flash message (checkpoint reached, oops, etc) -->
      <div id="flash" class="flash"></div>
    </div>

    <!-- ============ QUIZ MODAL ============ -->
    <div id="quiz" class="screen hidden">
      <div class="quiz-card">
        <div class="quiz-topic" id="quiz-topic">Math</div>
        <div class="quiz-prompt" id="quiz-prompt"></div>
        <div class="quiz-choices" id="quiz-choices"></div>
        <div class="quiz-feedback" id="quiz-feedback"></div>
      </div>
    </div>

    <!-- ============ WIN SCREEN ============ -->
    <div id="win" class="screen hidden">
      <div class="win-card">
        <div class="win-emoji">🏆</div>
        <h2>You did it!</h2>
        <p class="win-stars">You earned <span id="win-star-count">0</span> stars ⭐</p>
        <button id="btn-play-again" class="btn btn-big btn-accent">Play Again</button>
      </div>
    </div>

  </body>
</html>
